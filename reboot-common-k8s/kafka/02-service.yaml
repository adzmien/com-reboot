apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: reboot-infra
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: reboot-infra
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: 9092
      nodePort: 30092
    - name: controller
      port: 9093
      targetPort: 9093
      nodePort: 30391
