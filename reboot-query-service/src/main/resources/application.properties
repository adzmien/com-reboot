spring.application.name=reboot-query-service
server.port=8085

# ── DataSource ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://${INFRA_HOST:100.66.8.44}:30306/uam_query?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:rebootuser}
spring.datasource.password=${DB_PASSWORD:abc@123}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Kafka ───────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${INFRA_HOST:100.66.8.44}:30092
spring.kafka.consumer.group-id=query-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
