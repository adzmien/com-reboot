apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: reboot-uam
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: reboot-uam
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
