spring.application.name=reboot-auth-service
server.port=8081

# ── DataSource ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://${INFRA_HOST:100.66.8.44}:30306/uam_auth?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${REBOOT_DB_USERNAME:rebootuser}
spring.datasource.password=${REBOOT_DB_PASSWORD:abc@123}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Kafka ───────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${INFRA_HOST:100.66.8.44}:30092
spring.kafka.consumer.group-id=auth-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ── Redis ───────────────────────────────────────────────────────────────────
spring.data.redis.host=${INFRA_HOST:100.66.8.44}
spring.data.redis.port=30379
spring.data.redis.password=${REBOOT_REDIS_PASSWORD:abc@123}

# ── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:reboot-uam-super-secret-key-that-is-long-enough-for-hs256}
jwt.access-token-ttl-minutes=15
jwt.refresh-token-ttl-days=7

# ── Account lockout ─────────────────────────────────────────────────────────
auth.lockout.max-attempts=5
auth.lockout.lock-duration-minutes=30

# ── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
