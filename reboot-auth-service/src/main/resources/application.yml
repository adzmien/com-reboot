spring:
  application:
    name: reboot-auth-service
  datasource:
    url: jdbc:mariadb://localhost:3306/uam_auth
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    schemas: uam_auth

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
